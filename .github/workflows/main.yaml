name: Flask CI # Name of our workflow (can be any name you like)

on: # Specifies the events that will trigger the workflow. In this case, the workflow will run on every push event to the main or master branches 
  push:
    branches: [main, master]

jobs: # Defines the jobs that make up the workflow
  build: # Only on one job named "build"
    runs-on: ubuntu-latest # Specifies the type of computer that will run the job, will run on a (imaginary computer) with Ubunntu as the operating system 

    steps: # List of steps that make up the job
      - name: Checkout code # name of step
        uses: actions/checkout@v2 # Specifies action: used to check out the code from the repository.

      - name: Set up Python # name of step
        uses: actions/setup-python@v2 # action is used to set up Python.
        with: # specifies input parameters for the action
          python-version: 3.12 # specifies the version of Python to use 3.12

      - name: Create virtual environment # name of step
        run: | # specifies a shell command - creates venv
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies # name of step
        run: | # specifies shell command - install dependencies using pip
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Print debugging information # name of step
        run: | # specifies shell command - prints debugging info to the console
          echo "Python Version: $(python --version)"
          echo "Working Directory: $(pwd)"
          echo "Contents of Working Directory: $(ls -l)"
          echo "Contents of site-packages: $(ls -l venv/lib/python*/site-packages)"
  test:
    needs: build # means this test job will not run until the build job succesfully executed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: 3.12 

      - name: Create virtual environment
        run: |
          python -m venv venv
          source venv/bin/activate

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run tests # name of step
        run: python -m unittest discover -s tests -p 'test_*.py' # shell command to run all unit tests in Python located in tests directory, looking for files matching the pattern starting with test_ with anything after ending in '.py'